<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="Content-Style-Type" content="text/css">
  <title></title>
  <meta name="Generator" content="Cocoa HTML Writer">
  <meta name="CocoaVersion" content="2299.77">
  <style type="text/css">
    p.p1 {margin: 0.0px 0.0px 0.0px 0.0px; font: 12.0px Helvetica}
    p.p2 {margin: 0.0px 0.0px 0.0px 0.0px; font: 12.0px Helvetica; min-height: 14.0px}
  </style>
</head>
<body>
<p class="p1">&lt;h2&gt;Employee Ticket Dashboard&lt;/h2&gt;</p>
<p class="p2"><br></p>
<p class="p1">{% for ticket in tickets %}</p>
<p class="p2"><br></p>
<p class="p1">&lt;hr&gt;</p>
<p class="p2"><br></p>
<p class="p1">&lt;b&gt;{{ticket[1]}}&lt;/b&gt;&lt;br&gt;</p>
<p class="p2"><br></p>
<p class="p1">{{ticket[3]}}&lt;br&gt;</p>
<p class="p2"><br></p>
<p class="p1">Status: {{ticket[4]}}&lt;br&gt;</p>
<p class="p2"><br></p>
<p class="p1">&lt;a href="/resolve/{{ticket[0]}}"&gt;Mark Resolved&lt;/a&gt;</p>
<p class="p2"><br></p>
<p class="p1">{% endfor %}</p>
</body>
</html>
